name: Build

on:
  push:
    tags:
      - "v*"          # full build + release on tags
    branches:
      - main
      - master        # build on push to main (no release)
  pull_request:
    branches:
      - main
      - master        # build on PRs to verify it compiles
  workflow_dispatch: # or trigger manually from the Actions tab

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 ──────────────────────────────────────────────
          - os: ubuntu-latest
            name: linux-x86_64
            artifact: pandas_workbench

          # ── macOS Intel ───────────────────────────────────────────────
          - os: macos-13        # last Intel runner
            name: macos-intel
            artifact: pandas_workbench

          # ── macOS Apple Silicon ───────────────────────────────────────
          - os: macos-latest    # arm64 (M1/M2/M3)
            name: macos-arm64
            artifact: pandas_workbench

          # ── Windows x86_64 ────────────────────────────────────────────
          - os: windows-latest
            name: windows-x86_64
            artifact: pandas_workbench.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # tkinter ships with Python on Windows/macOS but needs a separate
      # system package on the GitHub-hosted Ubuntu runner
      - name: Install tkinter (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y python3-tk

      - name: Install Python dependencies
        run: pip install pandas pyinstaller

      # ── Build (Linux / macOS) ─────────────────────────────────────────
      - name: Build with PyInstaller (Unix)
        if: runner.os != 'Windows'
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name pandas_workbench \
            --hidden-import pandas \
            --hidden-import pandas._libs.tslibs.np_datetime \
            --hidden-import pandas._libs.tslibs.nattype \
            --hidden-import pandas._libs.tslibs.timedeltas \
            --hidden-import tkinter \
            --hidden-import _tkinter \
            pandas_workbench.py

      # ── Build (Windows) ───────────────────────────────────────────────
      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name pandas_workbench `
            --hidden-import pandas `
            --hidden-import pandas._libs.tslibs.np_datetime `
            --hidden-import pandas._libs.tslibs.nattype `
            --hidden-import pandas._libs.tslibs.timedeltas `
            --hidden-import tkinter `
            --hidden-import _tkinter `
            pandas_workbench.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pandas_workbench-${{ matrix.name }}
          path: dist/${{ matrix.artifact }}
          retention-days: 30

  # ── Create GitHub Release with all four binaries ──────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release   # each artifact lands in release/<artifact-name>/

      - name: Rename & mark executables
        run: |
          mv release/pandas_workbench-linux-x86_64/pandas_workbench     release/pandas_workbench-linux-x86_64
          mv release/pandas_workbench-macos-intel/pandas_workbench      release/pandas_workbench-macos-intel
          mv release/pandas_workbench-macos-arm64/pandas_workbench      release/pandas_workbench-macos-arm64
          mv release/pandas_workbench-windows-x86_64/pandas_workbench.exe release/pandas_workbench-windows-x86_64.exe
          chmod +x release/pandas_workbench-linux-x86_64
          chmod +x release/pandas_workbench-macos-intel
          chmod +x release/pandas_workbench-macos-arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/pandas_workbench-linux-x86_64
            release/pandas_workbench-macos-intel
            release/pandas_workbench-macos-arm64
            release/pandas_workbench-windows-x86_64.exe
